```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nilofar</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            background-color: #000;
            color: white;
        }

        .interface {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease;
        }

        /* Interface 1: Universe Theme */
        #interface1 {
            z-index: 10;
            background-image:
                radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 25% 20%, white, rgba(0,0,0,0)),
                linear-gradient(to bottom, #020107 0%, #0a0d3d 50%, #1c133a 100%);
            background-size: 200px 200px, 200px 200px, 200px 200px, auto, 100% 100%;
        }

        #moon {
            width: 120px;
            height: 120px;
            background-color: #f8c3d0;
            border-radius: 50%;
            box-shadow: 0 0 20px #f8c3d0, 0 0 60px #f8c3d0, 0 0 100px #f5a9b8;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #moon:active {
            transform: scale(0.9);
        }

        #interface1-text {
            margin-top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 2.2em;
            color: #f0e6ef;
            text-shadow: 0 0 10px #f8c3d0;
            padding: 0 20px;
        }

        /* Interface 2: Video Player */
        #interface2 {
            display: none;
            background-color: #000;
            z-index: 5;
        }

        #video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Final Popup */
        #final-popup {
            display: none;
            z-index: 100;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background-color: rgba(0,0,0,0.3);
        }

        #final-popup-content {
            background-color: rgba(26, 26, 46, 0.9);
            padding: 25px;
            border-radius: 20px;
            font-size: 1.5em;
            color: #ffc2d1;
            border: 1px solid #ffc2d1;
            box-shadow: 0 0 30px rgba(255,194,209,0.4);
            max-width: 80%;
        }

        @media (max-width: 480px) {
            #interface1-text { font-size: 1.6em; }
            #moon { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <!-- First Screen -->
    <div id="interface1" class="interface">
        <div id="moon"></div>
        <p id="interface1-text">Every beat of my heart started with you</p>
    </div>

    <!-- Video Screen -->
    <div id="interface2" class="interface">
        <div id="video-container">
            <video id="myVideo" playsinline>
                <source src="https://raw.githubusercontent.com/maryam-FOLDS/Sukhpreet/main/VID-20260406-WA0011.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <!-- Final Message -->
    <div id="final-popup" class="interface">
        <div id="final-popup-content">
            One life , one love , one heart ,one person and its always you . 
                 ( HARMAN ) 🎀🌍
        </div>
    </div>

    <script>
        const moon = document.getElementById('moon');
        const interface1 = document.getElementById('interface1');
        const interface2 = document.getElementById('interface2');
        const video = document.getElementById('myVideo');
        const finalPopup = document.getElementById('final-popup');

        let tapCount = 0;
        const requiredTaps = 5; // Moon needs to be tapped 5 times

        moon.addEventListener('click', () => {
            tapCount++;
            
            // Visual feedback
            moon.style.transform = "scale(1.1)";
            setTimeout(() => moon.style.transform = "scale(1)", 100);

            if (tapCount >= requiredTaps) {
                startVideoExperience();
            }
        });

        function startVideoExperience() {
            interface1.style.opacity = '0';
            setTimeout(() => {
                interface1.style.display = 'none';
                interface2.style.display = 'flex';
                video.play().catch(err => {
                    console.log("Autoplay prevented, waiting for user interaction");
                    // Show a message or play button if browser blocks video
                });
            }, 500);
        }

        // Show the final popup when the video ends
        video.onended = function() {
            finalPopup.style.display = 'flex';
            finalPopup.style.opacity = '1';
        };

        // Also allow clicking video to show popup early if user is impatient
        video.addEventListener('click', () => {
            if (video.paused) video.play();
        });
    </script>

</body>
</html>
