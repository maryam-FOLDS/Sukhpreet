<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nilofar</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;1,600&family=Great+Vibes&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            background-color: #000;
            color: white;
        }

        .interface {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.8s ease-in-out;
        }

        /* Interface 1: Universe Theme */
        #interface1 {
            z-index: 10;
            background-image:
                radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 25% 20%, white, rgba(0,0,0,0)),
                linear-gradient(to bottom, #020107 0%, #0a0d3d 50%, #1c133a 100%);
            background-size: 200px 200px, 200px 200px, 200px 200px, auto, 100% 100%;
        }

        #moon {
            width: 130px;
            height: 130px;
            background-color: #f8c3d0;
            border-radius: 50%;
            box-shadow: 0 0 20px #f8c3d0, 0 0 60px #f8c3d0, 0 0 100px #f5a9b8;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #moon:active {
            transform: scale(0.85);
        }

        #interface1-text {
            margin-top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 2.5em;
            color: #f0e6ef;
            text-shadow: 0 0 15px rgba(248, 195, 208, 0.8);
            padding: 0 20px;
        }

        /* Interface 2: Video Player */
        #interface2 {
            display: none;

        }

        #video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

            width: 100%;

</head>
<body>

    <!-- Screen 1: The Interactive Moon -->
    <div id="interface1" class="interface">
        <div id="moon"></div>
        <p id="interface1-text">Every beat of my heart started with you</p>
    </div>

    <!-- Screen 2: The Video Message -->
    <div id="interface2" class="interface">
        <div id="video-container">
            <video id="myVideo" playsinline>
                <source src="https://raw.githubusercontent.com/maryam-FOLDS/Sukhpreet/main/VID-20260406-WA0011.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- Screen 3: The Final Elegant Card -->
    <div id="final-popup" class="interface">
        <div id="final-popup-content">
            <div class="main-quote">
                One life, one love, one heart, one person and its always you.
            </div>
            <div class="signature">
                ( Harman ) <span class="emoji-span">🎀🌍</span>
            </div>
        </div>
    </div>

    <script>
        const moon = document.getElementById('moon');
        const interface1 = document.getElementById('interface1');
        const interface2 = document.getElementById('interface2');
        const video = document.getElementById('myVideo');
        const finalPopup = document.getElementById('final-popup');

        let tapCount = 0;
        const requiredTaps = 5; 

        // Moon interaction logic
        moon.addEventListener('click', () => {
            tapCount++;
            
            // Animation feel
            moon.style.transform = "scale(1.15)";
            setTimeout(() => moon.style.transform = "scale(1)", 100);

            if (tapCount >= requiredTaps) {
                switchToVideo();
            }
        });

        function switchToVideo() {
            interface1.style.opacity = '0';
            setTimeout(() => {
                interface1.style.display = 'none';
                interface2.style.display = 'flex';
                video.play().catch(err => {
                    console.log("Auto-play interaction required");
                    // Fallback for browsers that block auto-play
                    interface2.addEventListener('click', () => video.play(), {once: true});
                });
            }, 800);
        }

        // Trigger final card after video finishes
        video.onended = function() {
            finalPopup.style.display = 'flex';
            setTimeout(() => {
                finalPopup.style.opacity = '1';
            }, 100);
        };
    </script>

</body>
</html>
